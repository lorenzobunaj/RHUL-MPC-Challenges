version: '3.8'

services:
  rhul-00-00:
    build:
      context: ./challenges/00-introduction/00-outsourced-computation
    container_name: rhul_00_00
    restart: unless-stopped
    tty: true
    ports:
      - "${R00_00_PORT}:${R00_00_CHAL_PORT}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    networks:
      - internal

  rhul-01-00:
